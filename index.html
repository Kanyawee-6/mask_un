<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model AI</title>
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 24px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        #status-text {
            font-weight: 600;
            margin-bottom: 15px;
            color: #64748b;
        }

        .status-active {
            color: #10b981 !important;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #e2e8f0;
            transition: border-color 0.3s;
        }

        #webcam-container.active {
            border-color: var(--primary-color);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เหมือนกระจกเงา */
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background-color: #f1f5f9;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine AI</h2>
    <div class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ</div>
    
    <button type="button" class="btn" id="start-btn" onclick="startAutomation()">Start Automation</button>
    
    <div id="status-text">สถานะ: ปิดระบบ</div>
    
    <div id="webcam-container">
        <span id="cam-placeholder" style="color: #94a3b8; font-size: 14px;">กล้องปิดอยู่</span>
    </div>
    
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/0pcLfMHe6/";

    let model, labelContainer, maxPredictions;
    let localStream = null;
    let videoElement = null;
    let isActiveSession = false;
    let countdownInterval = null;

    const RUN_DURATION = 10000;      // ระยะเวลาเปิดกล้องรอบละ 10 วินาที
    const INTERVAL_TIME = 180000;    // วนลูปทุกๆ 3 นาที (180,000 ms)

    // 1. เริ่มต้นระบบและโหลด Model
    async function startAutomation() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Running...";
        updateStatus("กำลังโหลด Model...");
        
        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // สร้าง UI แสดงข้อความผลลัพธ์
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {
                let row = document.createElement("div");
                row.className = "label-row";
                labelContainer.appendChild(row);
            }

            // เริ่มงานรอบแรกทันที
            runSession();
        } catch (error) {
            updateStatus("โหลด Model ล้มเหลว กรุณาตรวจสอบลิงก์โมเดล");
            console.error(error);
        }
    }

    // 2. ฟังก์ชันเปิดกล้องและเริ่มทำนายผล
    async function runSession() {
        updateStatus("กำลังเปิดกล้อง...", true);
        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; // ล้างหน้าจอเก่าออก
        
        try {
            // เรียกใช้สตรีมกล้องผ่าน Web API มาตรฐาน
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 200, height: 200, facingMode: "user" }, 
                audio: false 
            });

            // สร้าง HTML Video Element มารับภาพ
            videoElement = document.createElement("video");
            videoElement.srcObject = localStream;
            videoElement.autoplay = true;
            videoElement.playsInline = true;
            container.appendChild(videoElement);
            container.classList.add("active");

            isActiveSession = true;
            updateStatus("กล้องกำลังตรวจจับภาพ...", true);
            
            // เริ่มลูปทำนายผล
            window.requestAnimationFrame(loop);

            // ตั้งเวลาปิดเมื่อทำงานครบกำหนด (10 วินาที)
            setTimeout(() => {
                stopSession();
            }, RUN_DURATION);

        } catch (err) {
            updateStatus("ไม่สามารถเข้าถึงกล้องได้! กรุณาอนุญาตสิทธิ์การใช้กล้อง หรือใช้ HTTPS");
            console.error("Camera error:", err);
            // หากเปิดไม่สำเร็จ ให้รอนับถอยหลังไปรอบถัดไปแทนเพื่อไม่ให้ระบบค้าง
            startCountdown((INTERVAL_TIME - RUN_DURATION) / 1000);
        }
    }

    // 3. ฟังก์ชันปิดกล้องอย่างสมบูรณ์เพื่อประหยัดพลังงาน
    function stopSession() {
        isActiveSession = false;
        
        // สั่งหยุดการทำงานของฮาร์ดแวร์กล้องทั้งหมด (ไฟกล้องจะดับสนิท)
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }

        // ล้าง Element กล้องออกจากหน้าจอ
        const container = document.getElementById("webcam-container");
        container.innerHTML = '<span style="color: #94a3b8; font-size: 14px;">กล้องปิดอยู่</span>';
        container.classList.remove("active");
        
        // เคลียร์ค่าตัวเลขเดิม
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.childNodes[i].innerHTML = `<span>รอรอบถัดไป...</span> <strong>-</strong>`;
        }

        // เริ่มนับถอยหลังเพื่อเข้าสู่รอบถัดไปในอีก 3 นาที
        let remainTime = (INTERVAL_TIME - RUN_DURATION) / 1000;
        startCountdown(remainTime);
    }

    // 4. ลูปอัปเดตการทำนายผล
    async function loop() {
        if (!isActiveSession) return;
        
        // ตรวจสอบความพร้อมของเฟรมวิดีโอ
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            await predict();
        }
        window.requestAnimationFrame(loop);
    }

    // 5. ส่งภาพจาก Video Element ให้ Teachable Machine คำนวณ
    async function predict() {
        if (!model || !videoElement) return;
        const prediction = await model.predict(videoElement);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probability}</strong>`;
        }
    }

    // ฟังก์ชันอัปเดตข้อความสถานะ
    function updateStatus(text, isActive = false) {
        const statusText = document.getElementById("status-text");
        statusText.innerText = "สถานะ: " + text;
        if (isActive) {
            statusText.classList.add("status-active");
        } else {
            statusText.classList.remove("status-active");
        }
    }

    // ฟังก์ชันระบบนับถอยหลัง
    function startCountdown(seconds) {
        clearInterval(countdownInterval);
        let timeLeft = seconds;
        
        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let secs = Math.floor(timeLeft % 60);
            let timeString = `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
            
            updateStatus(`พักระบบชั่วคราว (เริ่มใหม่ใน ${timeString} นาที)`);
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdownInterval);
                runSession(); // เริ่มรอบใหม่เมื่อเวลานับถอยหลังหมดลง
            }
        }, 1000);
    }
</script>

</body>
</html>
