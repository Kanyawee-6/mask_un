<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model AI</title>
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 24px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        #status-text {
            font-weight: 600;
            margin-bottom: 15px;
            color: #64748b;
        }

        .status-active {
            color: #10b981 !important;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #e2e8f0;
            transition: border-color 0.3s;
        }

        #webcam-container.active {
            border-color: var(--primary-color);
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background-color: #f1f5f9;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine AI</h2>
    <div class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ</div>
    
    <button type="button" class="btn" id="start-btn" onclick="startAutomation()">Start Automation</button>
    
    <div id="status-text">สถานะ: ปิดระบบ</div>
    
    <div id="webcam-container">
        <span id="cam-placeholder" style="color: #94a3b8; font-size: 14px;">กล้องปิดอยู่</span>
    </div>
    
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/0pcLfMHe6/";

    let model, webcam, labelContainer, maxPredictions;
    let isActiveSession = false;
    let countdownInterval = null;

    const RUN_DURATION = 10000;      // ให้กล้องทำงานรอบละ 10 วินาที
    const INTERVAL_TIME = 180000;    // วนลูปทุกๆ 3 นาที (180,000 ms)

    // 1. เริ่มต้นระบบครั้งแรก
    async function startAutomation() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Running...";
        
        updateStatus("กำลังโหลด Model และเปิดกล้องครั้งแรก...");
        
        // โหลด Model
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        maxPredictions = model.getTotalClasses();

        // สร้างพื้นที่แสดงผลข้อความทำนาย
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; 
        for (let i = 0; i < maxPredictions; i++) {
            let row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);
        }

        // ตั้งค่ากล้องหลักทิ้งไว้เลยเพื่อไม่ให้เกิดการสร้างซ้ำจนค้าง
        const flip = true;
        webcam = new tmImage.Webcam(200, 200, flip);
        await webcam.setup(); 
        
        // นำ Canvas ไปแปะใน UI
        const container = document.getElementById("webcam-container");
        const placeholder = document.getElementById("cam-placeholder");
        if(placeholder) placeholder.remove();
        container.appendChild(webcam.canvas);

        // รัน Loop หลักของระบบทิ้งไว้
        window.requestAnimationFrame(loop);

        // เริ่มต้นการทำงานรอบแรกทันที
        runSession();
    }

    // 2. ฟังก์ชันเริ่มสั่งให้กล้อง "จับภาพและทำนายผล"
    async function runSession() {
        updateStatus("กล้องกำลังทำงาน...", true);
        document.getElementById("webcam-container").classList.add("active");
        
        // สั่งเปิดการรับภาพจากกล้อง
        if (webcam.webcam && webcam.webcam.srcObject) {
            webcam.webcam.srcObject.getTracks().forEach(track => track.enabled = true);
        }
        
        isActiveSession = true;

        // เมื่อทำงานครบ 10 วินาที ให้หยุดทำนายและพักกล้อง
        setTimeout(() => {
            stopSession();
        }, RUN_DURATION);
    }

    // 3. ฟังก์ชันสั่ง "พักกล้อง" เพื่อรอรอบถัดไป
    function stopSession() {
        isActiveSession = false;
        document.getElementById("webcam-container").classList.remove("active");
        
        // สั่งปิด Track ภาพชั่วคราว (ไฟกล้องจะดับ หรือภาพจะหยุดนิ่งเพื่อประหยัดพลังงาน)
        if (webcam.webcam && webcam.webcam.srcObject) {
            webcam.webcam.srcObject.getTracks().forEach(track => track.enabled = false);
        }

        // ล้างค่าข้อความเปอร์เซ็นต์เก่าตอนดับกล้อง
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.childNodes[i].innerHTML = `<span>รอรอบถัดไป...</span> <strong>-</strong>`;
        }

        // เริ่มนับถอยหลัง 3 นาทีก่อนเริ่มรอบใหม่ (ลบเวลาที่เปิดกล้องไปแล้ว 10 วินาที)
        let remainTime = (INTERVAL_TIME - RUN_DURATION) / 1000;
        startCountdown(remainTime);
    }

    // 4. Loop หลักที่คอยอัปเดตภาพ
    async function loop() {
        if (isActiveSession) {
            webcam.update(); 
            await predict();
        }
        window.requestAnimationFrame(loop);
    }

    // 5. ฟังก์ชันทำนายผล
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probability}</strong>`;
        }
    }

    // ฟังก์ชันช่วยแสดงสถานะ
    function updateStatus(text, isActive = false) {
        const statusText = document.getElementById("status-text");
        statusText.innerText = "สถานะ: " + text;
        if (isActive) {
            statusText.classList.add("status-active");
        } else {
            statusText.classList.remove("status-active");
        }
    }

    // ฟังก์ชันช่วยนับถอยหลัง
    function startCountdown(seconds) {
        clearInterval(countdownInterval);
        let timeLeft = seconds;
        
        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let secs = Math.floor(timeLeft % 60);
            let timeString = `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
            
            updateStatus(`พักระบบชั่วคราว (เริ่มใหม่ใน ${timeString} นาที)`);
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdownInterval);
                runSession(); // เมื่อหมดเวลานับถอยหลัง ให้เริ่มทำงานรอบใหม่
            }
        }, 1000);
    }
</script>

</body>
</html>
