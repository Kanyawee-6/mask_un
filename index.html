<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model AI</title>
    
    <!-- สไตล์แต่งหน้าตา UI ให้สวยงามและทันสมัย -->
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 24px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        #status-text {
            font-weight: 600;
            margin-bottom: 15px;
            color: #64748b;
        }

        .status-active {
            color: #10b981 !important;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #e2e8f0;
            transition: border-color 0.3s;
        }

        #webcam-container.active {
            border-color: var(--primary-color);
        }

        #webcam-container canvas {
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background-color: #f1f5f9;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine AI</h2>
    <div class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ</div>
    
    <button type="button" class="btn" id="start-btn" onclick="startAutomation()">Start Automation</button>
    
    <div id="status-text">สถานะ: ปิดระบบ</div>
    
    <div id="webcam-container">
        <span style="color: #94a3b8; font-size: 14px;">กล้องปิดอยู่</span>
    </div>
    
    <div id="label-container"></div>
</div>

<!-- โหลด Libraries จาก Google -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์ไปยังโมเดล Teachable Machine ของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/0pcLfMHe6/";[cite: 1]

    let model, webcam, labelContainer, maxPredictions;
    let isLooping = false;
    let automationInterval = null;
    let countdownInterval = null;

    const RUN_DURATION = 10000;      // ระยะเวลาให้กล้องเปิดทำงานในแต่ละรอบ = 10 วินาที
    const INTERVAL_TIME = 180000;    // ตั้งเวลาทำงานทุกๆ 3 นาที = 180,000 มิลลิวินาที

    // ฟังก์ชันเริ่มต้นระบบ Automation เมื่อกดปุ่ม
    async function startAutomation() {
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Running...";
        
        // โหลด Model ครั้งแรกครั้งเดียว
        updateStatus("กำลังโหลด Model...");
        const modelURL = URL + "model.json";[cite: 1]
        const metadataURL = URL + "metadata.json";[cite: 1]
        model = await tmImage.load(modelURL, metadataURL);[cite: 1]
        maxPredictions = model.getTotalClasses();[cite: 1]

        // สร้างพื้นที่แสดงผล Label ให้สวยงาม
        labelContainer = document.getElementById("label-container");[cite: 1]
        labelContainer.innerHTML = ""; 
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            let row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);[cite: 1]
        }

        // เริ่มทำงานรอบแรกทันที
        triggerCameraSession();

        // ตั้งเวลาให้ทำงานซ้ำทุกๆ 3 นาที
        automationInterval = setInterval(triggerCameraSession, INTERVAL_TIME);
    }

    // ฟังก์ชันสำหรับเปิดกล้องและทำงานเป็นเวลา 10 วินาที
    async function triggerCameraSession() {
        updateStatus("กำลังเปิดกล้อง...", true);
        
        // Setup กล้องถ่ายภาพ
        const flip = true;[cite: 1]
        webcam = new tmImage.Webcam(200, 200, flip);[cite: 1]
        await webcam.setup();[cite: 1]
        await webcam.play();[cite: 1]
        
        // แสดงผลกล้องบน UI
        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; 
        container.appendChild(webcam.canvas);[cite: 1]
        container.classList.add("active");

        isLooping = true;
        window.requestAnimationFrame(loop);[cite: 1]
        updateStatus("กล้องกำลังทำงานและตรวจจับ...", true);

        // เมื่อครบ 10 วินาที ให้ปิดกล้องและรอรอบถัดไป
        setTimeout(() => {
            stopCameraSession();
        }, RUN_DURATION);
    }

    // ฟังก์ชันสำหรับปิดกล้องชั่วคราวเพื่อรอรอบใหม่
    function stopCameraSession() {
        isLooping = false;
        if (webcam) {
            webcam.stop();
        }
        
        // รีเซ็ต UI ของกล้อง
        const container = document.getElementById("webcam-container");
        container.innerHTML = '<span style="color: #94a3b8; font-size: 14px;">กล้องปิดอยู่</span>';
        container.classList.remove("active");
        
        // เริ่มแสดงเลขนับถอยหลัง 3 นาทีก่อนเริ่มรอบใหม่
        startCountdown(INTERVAL_TIME / 1000 - (RUN_DURATION / 1000));
    }

    // Loop อัปเดตเฟรมภาพจากกล้อง
    async function loop() {
        if (!isLooping) return;
        webcam.update();[cite: 1]
        await predict();[cite: 1]
        window.requestAnimationFrame(loop);[cite: 1]
    }

    // ฟังก์ชันทำนายผล
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 1]
        for (let i = 0; i < maxPredictions; i++) {[cite: 1]
            const className = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; // ปรับแสดงผลเป็น % ให้ดูง่าย
            
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probability}</strong>`;
        }
    }

    // ฟังก์ชันสำหรับเปลี่ยนข้อความสถานะบนหน้าจอ
    function updateStatus(text, isActive = false) {
        const statusText = document.getElementById("status-text");
        statusText.innerText = "สถานะ: " + text;
        if (isActive) {
            statusText.classList.add("status-active");
        } else {
            statusText.classList.remove("status-active");
        }
    }

    // ฟังก์ชันนับถอยหลังแสดงเวลาที่จะเปิดกล้องรอบถัดไป
    function startCountdown(seconds) {
        clearInterval(countdownInterval);
        let timeLeft = seconds;
        
        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            let timeString = `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
            
            updateStatus(`ปิดกล้องชั่วคราว (จะเปิดใหม่ในอีก ${timeString} นาที)`);
            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
    }
</script>

</body>
</html>
